name: Build & Push Web

on:
  push:
    branches: [ main ]   
  workflow_dispatch: {}

jobs:
  web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # If you need build-time envs for Next (e.g. NEXT_PUBLIC_*):
      # - name: Export build env
      #   run: |
      #     echo "NEXT_PUBLIC_API_BASE=${{ secrets.NEXT_PUBLIC_API_BASE }}" >> $GITHUB_ENV

      - name: Build & Push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/app-web:latest,${{ secrets.DOCKERHUB_USERNAME }}/app-web:${{ github.sha }}
          # If you exported envs above, pass them here:
          # build-args: |
          #   NEXT_PUBLIC_API_BASE=${{ env.NEXT_PUBLIC_API_BASE }}

      - name: Deploy to Droplet via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.DROPLET_HOST }}
          username: ${{ secrets.DROPLET_USERNAME }}
          key: ${{ secrets.DROPLET_SSH_KEY }}
          script: |
            set -euo pipefail
            docker login -u ${{ secrets.DOCKERHUB_USERNAME }} -p ${{ secrets.DOCKERHUB_TOKEN }}
            cd /opt/appstack
            # Ensure docker-compose.yml has:
            # web:
            # image: ${{ secrets.DOCKERHUB_USERNAME }}/app-web:latest
            docker compose pull web
            docker compose up -d --no-deps web
            docker image prune -f


